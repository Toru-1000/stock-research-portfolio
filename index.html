<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株価AIリサーチ＆ポートフォリオ（セキュリティ強化版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const _app_id = 'stock-research-portfolio-v3';
        
        // 🔒 パスワード「0704」のSHA-256ハッシュ値。コードを見られても元の番号が分かりにくくなります。
        const PASSWORD_HASH = "8f69e6d03d3509935ad8dbbc2a2e41369cfca01b7a661625925e0fa0c14b3017";

        const INITIAL_PORTFOLIO = [
            { 
                id: "toyota-sample", 
                ticker: "7203", 
                companyName: "トヨタ自動車", 
                purchaseDate: "2020-04-01",
                originalShares: 100, 
                currentShares: 500, 
                originalPrice: 1300, 
                currentPrice: 2750, 
                stockSplits: [ { date: "2021-10-01", ratio: 5, description: "1株につき5株の割合で分割" } ], 
                historicalPrices: [ { date: "2020-04-01", price: 1300 }, { date: "2022-04-01", price: 2100 }, { date: "2024-04-01", price: 3600 }, { date: "2026-06-25", price: 2750 } ], 
                shareholderBenefits: "100株以上：株主優待制度あり（トヨタ施設優待など）", 
                benefitsConditions: "毎年3月末時点の株主名簿に記載されている株主", 
                dividends: [ { year: "2022", amount: 48 }, { year: "2023", amount: 60 }, { year: "2024", amount: 75 }, { year: "2025", amount: 90 }, { year: "2026", amount: 100 } ] 
            }
        ];

        // 簡易ハッシュ関数 (パスワードの平文保存を防ぐ)
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return sessionStorage.getItem(`${_app_id}_auth`) === 'true';
            });
            const [passwordInput, setPasswordInput] = useState("");
            const [loginError, setLoginError] = useState("");

            // APIキーはローカルストレージから取得（コードには書かない）
            const [apiKey, setApiKey] = useState(() => {
                return localStorage.getItem(`${_app_id}_apikey`) || "";
            });

            const [portfolio, setPortfolio] = useState(() => {
                const saved = localStorage.getItem(`${_app_id}_portfolio`);
                return saved ? JSON.parse(saved) : INITIAL_PORTFOLIO;
            });
            const [activeTab, setActiveTab] = useState('portfolio');
            const [detailTab, setDetailTab] = useState('summary'); 
            const [selectedStockId, setSelectedStockId] = useState(portfolio[0]?.id || "");
            const [formData, setFormData] = useState({ query: "", originalShares: "", purchaseDate: "" });
            const [aiLoading, setAiLoading] = useState(false);
            const [aiProgress, setAiProgress] = useState("");
            const [errorMessage, setErrorMessage] = useState("");
            const [notification, setNotification] = useState("");

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (isAuthenticated) {
                    localStorage.setItem(`${_app_id}_portfolio`, JSON.stringify(portfolio));
                    if (portfolio.length === 0) {
                        setSelectedStockId("");
                    } else if (!portfolio.find(p => p.id === selectedStockId)) {
                        setSelectedStockId(portfolio[0].id);
                    }
                }
            }, [portfolio, selectedStockId, isAuthenticated]);

            // グラフの描画ロジック
            useEffect(() => {
                if (isAuthenticated && detailTab === 'graph' && selectedStockId && chartRef.current) {
                    const currentStock = portfolio.find(p => p.id === selectedStockId);
                    if (!currentStock) return;

                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const sortedHistory = [...currentStock.historicalPrices].sort((a, b) => new Date(a.date) - new Date(b.date));
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: sortedHistory.map(h => h.date),
                            datasets: [{
                                label: `${currentStock.companyName} 株価推移 (¥)`,
                                data: sortedHistory.map(h => h.price),
                                borderColor: '#818cf8',
                                backgroundColor: 'rgba(129, 140, 248, 0.1)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { labels: { color: '#f1f5f9' } } },
                            scales: {
                                x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                                y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                            }
                        }
                    });
                }
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [detailTab, selectedStockId, activeTab, isAuthenticated, portfolio]);

            const selectedStock = portfolio.find(p => p.id === selectedStockId);

            // 認証処理 (非同期ハッシュ比較)
            const handleLogin = async (e) => {
                e.preventDefault();
                const inputHash = await sha256(passwordInput);
                if (inputHash === PASSWORD_HASH) {
                    setIsAuthenticated(true);
                    sessionStorage.setItem(`${_app_id}_auth`, 'true');
                    setLoginError("");
                } else {
                    setLoginError("パスワードが正しくありません。");
                    setPasswordInput("");
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                sessionStorage.removeItem(`${_app_id}_auth`);
            };

            const handleSaveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem(`${_app_id}_apikey`, apiKey);
                showNotification("AIキーを保存しました。");
            };

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(""), 4000);
            };

            const handleResearchAndAdd = async (e) => {
                e.preventDefault();
                if (!formData.query || !formData.originalShares || !formData.purchaseDate) {
                    setErrorMessage("すべての項目を入力してください。");
                    return;
                }
                if (!apiKey.trim()) {
                    setErrorMessage("⚠️ APIキーが設定されていません。右上の「設定」からキーを入力してください。");
                    return;
                }

                setAiLoading(true);
                setErrorMessage("");
                setAiProgress("Google検索を使って情報を収集中...");

                const todayStr = new Date().toISOString().split('T')[0];

                try {
                    const prompt = `
                    対象銘柄: ${formData.query}
                    購入日: ${formData.purchaseDate}
                    本日日付: ${todayStr}

                    以下の条件を厳密に守り、指定されたJSONフォーマットのみで返答してください。日本語で出力してください。
                    解説や挨拶、マークダウンは一切含めず、純粋なJSONオブジェクトだけを返してください。

                    {
                        "ticker": "証券コード",
                        "companyName": "正式な会社名(日本語)",
                        "originalPrice": 購入日当時の株価(数値のみ、カンマなし),
                        "currentPrice": 本日現在の最新リアルタイム株価(数値のみ、カンマなし),
                        "stockSplits": [ { "date": "YYYY-MM-DD", "ratio": 分割比率(数値), "description": "説明(例: 1株につきX株の割合で分割)" } ],
                        "historicalPrices": [ { "date": "${formData.purchaseDate}", "price": 当時の株価 }, { "date": "${todayStr}", "price": 現在の株価 } ],
                        "shareholderBenefits": "優待内容(日本語)",
                        "benefitsConditions": "獲得条件や権利確定月(日本語)",
                        "dividends": [ {"year":"2022","amount":1株あたり配当金数値}, {"year":"2023","amount":1株あたり配当金数値}, {"year":"2024","amount":1株あたり配当金数値}, {"year":"2025","amount":1株あたり配当金数値}, {"year":"2026","amount":1株あたり配当金数値} ]
                    }`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ googleSearch: {} }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) {
                        throw new Error(data.error.message || "APIエラーが発生しました。");
                    }
                    
                    if (!data.candidates || !data.candidates[0].content.parts[0].text) {
                        throw new Error("AIからの応答が空でした。");
                    }

                    const aiText = data.candidates[0].content.parts[0].text.trim();
                    const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) {
                        throw new Error("応答から有効なJSONデータが見つかりませんでした。");
                    }
                    
                    const stockData = JSON.parse(jsonMatch[0]);

                    let calculatedShares = parseFloat(formData.originalShares);
                    if (stockData.stockSplits && stockData.stockSplits.length > 0) {
                        stockData.stockSplits.forEach(split => {
                            if (new Date(split.date) > new Date(formData.purchaseDate)) {
                                calculatedShares = calculatedShares * split.ratio;
                            }
                        });
                    }

                    const newStock = {
                        id: "_" + Date.now(),
                        ticker: stockData.ticker || "0000",
                        companyName: stockData.companyName || formData.query,
                        purchaseDate: formData.purchaseDate,
                        originalShares: parseFloat(formData.originalShares),
                        currentShares: calculatedShares,
                        originalPrice: Number(stockData.originalPrice) || 1000,
                        currentPrice: Number(stockData.currentPrice) || 1000,
                        stockSplits: stockData.stockSplits || [],
                        historicalPrices: stockData.historicalPrices || [],
                        shareholderBenefits: stockData.shareholderBenefits || "情報なし",
                        benefitsConditions: stockData.benefitsConditions || "情報なし",
                        dividends: stockData.dividends || []
                    };

                    setPortfolio([...portfolio, newStock]);
                    setSelectedStockId(newStock.id);
                    setFormData({ query: "", originalShares: "", purchaseDate: "" });
                    setActiveTab('portfolio');
                    setDetailTab('summary');
                    showNotification(`「${newStock.companyName}」を追加しました！`);
                } catch (err) {
                    console.error(err);
                    setErrorMessage(`AIリサーチ中にエラーが発生しました: ${err.message}`);
                } finally {
                    setAiLoading(false);
                }
            };

            const handleDeleteStock = (id, name) => {
                if (confirm(`「${name}」を削除しますか？`)) {
                    setPortfolio(portfolio.filter(p => p.id !== id));
                    showNotification("削除しました。");
                }
            };

            // ログイン画面
            if (!isAuthenticated) {
                return (
                    <div class="min-h-screen flex items-center justify-center p-4 bg-slate-950">
                        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm text-center">
                            <h1 class="text-xl font-bold text-indigo-400 mb-2">ポートフォリオ管理</h1>
                            <p class="text-xs text-slate-400 mb-6">このページは保護されています。暗証番号を入力してください。</p>
                            <form onSubmit={handleLogin} class="space-y-4">
                                <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="暗証番号を入力" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-center font-mono text-xl tracking-widest text-white focus:outline-none focus:border-indigo-500" autoFocus />
                                {loginError && <p class="text-xs text-rose-400 font-bold">{loginError}</p>}
                                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium p-2.5 rounded text-sm transition">ロック解除</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // メイン画面
            return (
                <div class="max-w-6xl mx-auto p-4">
                    <header class="mb-8 border-b border-slate-800 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h1 class="text-2xl font-bold text-indigo-400">株価AIリサーチ＆ポートフォリオ</h1>
                            <p class="text-xs text-slate-400 mt-1">リアルタイム株価・分割履歴・優待・5年配当を自動追跡</p>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full sm:w-auto justify-end">
                            <button onClick={() => setActiveTab('portfolio')} class={`px-4 py-2 rounded text-sm font-medium ${activeTab === 'portfolio' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>ポートフォリオ</button>
                            <button onClick={() => setActiveTab('add')} class={`px-4 py-2 rounded text-sm font-medium ${activeTab === 'add' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>AI銘柄自動追加</button>
                            <button onClick={() => setActiveTab('settings')} class={`px-4 py-2 rounded text-sm font-medium ${activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>⚙️ 設定</button>
                            <button onClick={handleLogout} class="px-3 py-2 rounded text-sm font-medium bg-slate-900 text-slate-400 hover:bg-slate-800 border border-slate-700">🔒 施錠</button>
                        </div>
                    </header>

                    {notification && <div class="fixed bottom-4 right-4 bg-emerald-600 text-white px-4 py-3 rounded-lg shadow-xl z-50">{notification}</div>}

                    {/* タブ1: ポートフォリオ */}
                    {activeTab === 'portfolio' && (
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 h-fit">
                                <h2 class="font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">保有銘柄一覧</h2>
                                {portfolio.length === 0 ? (
                                    <p class="text-xs text-slate-500 text-center py-4">登録された銘柄はありません</p>
                                ) : (
                                    <div class="space-y-2">
                                        {portfolio.map(stock => {
                                            const profit = (stock.currentPrice * stock.currentShares) - (stock.originalPrice * stock.originalShares);
                                            return (
                                                <div key={stock.id} onClick={() => setSelectedStockId(stock.id)} class={`p-3 rounded-lg cursor-pointer transition ${selectedStockId === stock.id ? 'bg-indigo-900/60 border border-indigo-500' : 'bg-slate-700/50 hover:bg-slate-700'}`}>
                                                    <div class="flex justify-between font-bold">
                                                        <span>{stock.companyName}</span>
                                                        <span class="text-indigo-300">{stock.ticker}</span>
                                                    </div>
                                                    <div class="flex justify-between text-xs text-slate-400 mt-2">
                                                        <span>保有: {stock.currentShares}株</span>
                                                        <span class={profit >= 0 ? "text-emerald-400 font-bold" : "text-rose-400 font-bold"}>
                                                            {profit >= 0 ? "¥+" : "¥"}{profit.toLocaleString()}
                                                        </span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            <div class="md:col-span-2 space-y-4">
                                {selectedStock ? (
                                    <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                                        <div class="p-6 bg-slate-800/50 border-b border-slate-700 flex justify-between items-start">
                                            <div>
                                                <h2 class="text-2xl font-bold text-white">{selectedStock.companyName} <span class="text-sm font-normal text-slate-400">({selectedStock.ticker})</span></h2>
                                                <p class="text-xs text-slate-400 mt-1">購入日: {selectedStock.purchaseDate}</p>
                                            </div>
                                            <button onClick={() => handleDeleteStock(selectedStock.id, selectedStock.companyName)} class="text-xs bg-rose-950 text-rose-400 px-3 py-1.5 rounded hover:bg-rose-900 border border-rose-800 transition">削除</button>
                                        </div>

                                        <div class="flex border-b border-slate-700 bg-slate-900/40 text-sm">
                                            <button onClick={() => setDetailTab('summary')} class={`flex-1 py-3 text-center font-medium ${detailTab === 'summary' ? 'text-indigo-400 border-b-2 border-indigo-500 bg-slate-800/30' : 'text-slate-400 hover:text-slate-200'}`}>損益・分割</button>
                                            <button onClick={() => setDetailTab('graph')} class={`flex-1 py-3 text-center font-medium ${detailTab === 'graph' ? 'text-indigo-400 border-b-2 border-indigo-500 bg-slate-800/30' : 'text-slate-400 hover:text-slate-200'}`}>株価変動グラフ</button>
                                            <button onClick={() => setDetailTab('benefits')} class={`flex-1 py-3 text-center font-medium ${detailTab === 'benefits' ? 'text-indigo-400 border-b-2 border-indigo-500 bg-slate-800/30' : 'text-slate-400 hover:text-slate-200'}`}>優待・5年配当</button>
                                        </div>

                                        <div class="p-6">
                                            {detailTab === 'summary' && (
                                                <div class="space-y-6">
                                                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                                        <div class="bg-slate-900/60 p-3 rounded-lg">
                                                            <div class="text-xs text-slate-400">購入単価 / 現在株価</div>
                                                            <div class="text-sm font-bold text-white mt-1">¥{selectedStock.originalPrice.toLocaleString()} → ¥{selectedStock.currentPrice.toLocaleString()}</div>
                                                        </div>
                                                        <div class="bg-slate-900/60 p-3 rounded-lg">
                                                            <div class="text-xs text-slate-400">購入時株数 / 現在株数</div>
                                                            <div class="text-sm font-bold text-white mt-1">{selectedStock.originalShares}株 → <span class="text-indigo-300">{selectedStock.currentShares}株</span></div>
                                                        </div>
                                                        <div class="bg-slate-900/60 p-3 rounded-lg col-span-2 sm:col-span-1">
                                                            <div class="text-xs text-slate-400">通算損益</div>
                                                            <div class={`text-base font-bold mt-1 ${((selectedStock.currentPrice * selectedStock.currentShares) - (selectedStock.originalPrice * selectedStock.originalShares)) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>
                                                                ¥{((selectedStock.currentPrice * selectedStock.currentShares) - (selectedStock.originalPrice * selectedStock.originalShares)).toLocaleString()}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="bg-slate-900/40 p-4 rounded-lg border border-slate-700/60">
                                                        <h3 class="font-bold text-slate-300 text-sm mb-2">📈 株式分割の履歴</h3>
                                                        {selectedStock.stockSplits.length === 0 ? (
                                                            <p class="text-xs text-slate-500">購入日以降に株式分割の履歴はありません。</p>
                                                        ) : (
                                                            <ul class="space-y-2 text-xs">
                                                                {selectedStock.stockSplits.map((split, i) => (
                                                                    <li key={i} class="bg-slate-800 p-2 rounded border border-slate-700 flex justify-between">
                                                                        <span>🗓 {split.date}</span>
                                                                        <span class="text-indigo-400 font-bold">{split.description}</span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {detailTab === 'graph' && (
                                                <div class="h-64 w-full relative">
                                                    <canvas ref={chartRef}></canvas>
                                                </div>
                                            )}

                                            {detailTab === 'benefits' && (
                                                <div class="space-y-6">
                                                    <div class="bg-slate-900/40 p-4 rounded-lg border border-slate-700/60">
                                                        <h3 class="font-bold text-indigo-300 text-sm mb-1">🎁 最新の株主優待情報</h3>
                                                        <p class="text-sm leading-relaxed">{selectedStock.shareholderBenefits}</p>
                                                        <div class="text-xs text-slate-400 mt-2 bg-slate-800 p-2 rounded">【権利確定・獲得条件】{selectedStock.benefitsConditions}</div>
                                                    </div>
                                                    <div class="bg-slate-900/40 p-4 rounded-lg border border-slate-700/60">
                                                        <h3 class="font-bold text-emerald-400 text-sm mb-2">💰 直近5年間の配当金実績 (1株当たり)</h3>
                                                        {(!selectedStock.dividends || selectedStock.dividends.length === 0) ? (
                                                            <p class="text-xs text-slate-500">配当データはありません。</p>
                                                        ) : (
                                                            <div class="grid grid-cols-5 gap-2 text-center">
                                                                {selectedStock.dividends.map((div, i) => (
                                                                    <div key={i} class="bg-slate-800 p-2 rounded border border-slate-700">
                                                                        <div class="text-xs text-slate-400">{div.year}年</div>
                                                                        <div class="text-sm font-bold text-white mt-1">¥{div.amount}</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div class="bg-slate-800 p-12 rounded-xl border border-slate-700 text-center text-slate-400">登録がありません。</div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* タブ2: 銘柄追加 */}
                    {activeTab === 'add' && (
                        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 max-w-xl mx-auto">
                            <h2 class="text-xl font-bold mb-2 text-white">AIで銘柄リアルタイムリサーチ</h2>
                            <form onSubmit={handleResearchAndAdd} class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-1">銘柄名 または 証券コード</label>
                                    <input type="text" value={formData.query} onChange={e => setFormData({...formData, query: e.target.value})} placeholder="例: トヨタ" class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-sm text-white focus:outline-none" />
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-400 mb-1">当時購入した株数</label>
                                        <input type="number" value={formData.originalShares} onChange={e => setFormData({...formData, originalShares: e.target.value})} placeholder="100" class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-400 mb-1">購入日</label>
                                        <input type="date" value={formData.purchaseDate} onChange={e => setFormData({...formData, purchaseDate: e.target.value})} class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-sm text-white focus:outline-none" />
                                    </div>
                                </div>
                                {errorMessage && <div class="text-xs text-rose-400 font-bold bg-rose-950/40 p-2 rounded">{errorMessage}</div>}
                                <button type="submit" disabled={aiLoading} class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium p-2.5 rounded text-sm transition disabled:opacity-50">
                                    {aiLoading ? `⌛ ${aiProgress}` : "AI自動リサーチを開始"}
                                </button>
                            </form>
                        </div>
                    )}

                    {/* タブ3: 設定（APIキー管理用） */}
                    {activeTab === 'settings' && (
                        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 max-w-xl mx-auto">
                            <h2 class="text-xl font-bold mb-2 text-white">⚙️ アプリケーション設定</h2>
                            <p class="text-xs text-slate-400 mb-4">APIキーはブラウザに安全に保存され、コードファイル自体には書き込まれません。</p>
                            <form onSubmit={handleSaveApiKey} class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-1">Gemini API キー</label>
                                    <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AI.Ab8..." class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-sm text-white font-mono focus:outline-none focus:border-indigo-500" />
                                </div>
                                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium p-2.5 rounded text-sm transition">
                                    設定を保存
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
